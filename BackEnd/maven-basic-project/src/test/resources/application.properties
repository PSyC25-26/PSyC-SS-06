# Configuración para los tests
# Base de datos H2 en memoria (no usa la DB real del proyecto)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Clave JWT para los tests (mínimo 256 bits)
jwt.secret=ClaveSecretaParaTestsDeAutoEliteConSuficienteLongitudParaJWT256BitsAqui
